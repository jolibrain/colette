services:
    gpu_server:
        build:
            context: .
            dockerfile: docker/gpu_server.Dockerfile
        user: "${USER_ID}:${GROUP_ID}"
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: 2
                          capabilities: [gpu]
        ports:
            - "1873:1873"
        environment:
            NVIDIA_DRIVER_CAPABILITIES: compute,utility
            APP_NAME: ${APP_NAME}
            HF_TOKEN: ${HF_TOKEN}
            HF_HOME: /cache/huggingface
            HOME: /tmp
        volumes:
            - ${MODELS_PATH}:/models
            - ${DATA_PATH}:/data
            - ${APPS_PATH}:/rag
            - ${APPS_PATH}/.cache:/cache
        # Remove the entrypoint and command overrides - let the Dockerfile's defaults work
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -qO- http://localhost:1873/v1/info > /dev/null || exit 1",
                ]
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 15s
    ui:
        build:
            context: .
            dockerfile: docker/ui.Dockerfile
        user: "${USER_ID}:${GROUP_ID}"
        working_dir: /tmp  # Change to writable directory
        environment:
            PYTHONPATH: /app/src
            APP_NAME: ${APP_NAME}
            HF_HOME: /cache/huggingface
            HOME: /tmp
        volumes:
            - ${APPS_PATH}/.cache:/cache
        ports:
            - "7860:7860"
        entrypoint: ["python", "/app/src/colette/ui/app.py"]
        command: ["--config", "/app/src/colette/config/vrag_default.json"]
        depends_on:
            gpu_server:
                condition: service_healthy