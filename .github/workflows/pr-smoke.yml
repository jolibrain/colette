name: PR Smoke

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: smoke
    runs-on: [self-hosted, linux, cpu]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run CI smoke suite
        run: make ci-smoke

      - name: Upload smoke JUnit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-smoke
          path: .ci-artifacts/junit-smoke.xml
          if-no-files-found: ignore
