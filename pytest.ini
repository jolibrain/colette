[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore:Field ".*" in .* has conflict with protected namespace "model_":UserWarning
markers =
    smoke: fast localhost-safe validation subset.
    gpu: requires GPU resources or CUDA-backed model execution.
    integration: exercises integration behavior across multiple components.
    e2e: end-to-end workflows with broader runtime dependencies.
    evaluation: optional local evaluation contract checks backed by tools/evaluation.py and extra NLP dependencies.
    repository_path: mark a test as a repository path test.